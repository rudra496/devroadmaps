<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap — DevRoadmaps</title>
    <meta name="description" content="Interactive developer roadmap with progress tracking.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
</head>
<body class="roadmap-page">
    <canvas id="particles"></canvas>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🗺️ DevRoadmaps</a>
            <div class="nav-links" id="navLinks">
                <a href="index.html#roadmaps">All Roadmaps</a>
                <a href="index.html#features">Features</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <header class="roadmap-header" id="roadmapHeader">
        <div class="container">
            <a href="index.html#roadmaps" class="back-link">← All Roadmaps</a>
            <div class="roadmap-title-area">
                <span class="roadmap-icon" id="roadmapIcon"></span>
                <h1 id="roadmapTitle">Loading...</h1>
            </div>
            <p class="roadmap-desc" id="roadmapDesc"></p>
            <div class="roadmap-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search topics..." autocomplete="off">
                </div>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="fundamentals">📖 Fundamentals</button>
                    <button class="filter-btn" data-filter="intermediate">📘 Intermediate</button>
                    <button class="filter-btn" data-filter="advanced">📕 Advanced</button>
                    <button class="filter-btn" data-filter="tools">🔧 Tools</button>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-sm" id="resetBtn">Reset Progress</button>
                    <button class="btn btn-sm" id="printBtn">🖨️ Print</button>
                    <button class="btn btn-sm" id="expandAllBtn">Expand All</button>
                    <button class="btn btn-sm" onclick="toggleTimer(currentRoadmap)" id="timerToggle">▶ Start Timer</button>
                    <span class="nav-badge" title="Study Timer"><span id="timerDisplay">25:00</span> <span id="timerLabel">🍅 Focus</span></span>
                    <span class="nav-badge" title="Total Study Time">⏱️ <span class="total-study-time">0m 0s</span></span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </div>
    </header>

    <main class="roadmap-main">
        <div class="container">
            <div class="roadmap-layout">
                <!-- Minimap -->
                <aside class="minimap" id="minimap">
                    <div class="minimap-content" id="minimapContent"></div>
                </aside>

                <!-- Roadmap Nodes -->
                <div class="roadmap-nodes" id="roadmapNodes">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

    <script src="js/main.js"></script>
    <script src="js/learning-paths.js"></script>
    <script src="js/timer.js"></script>
    <script>
    const params = new URLSearchParams(window.location.search);
    const currentRoadmap = params.get('roadmap') || '';
    initTimerWidget();
    </script>
</body>
</html>
